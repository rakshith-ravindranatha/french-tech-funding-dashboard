// ── STATE ─────────────────────────────────────────────────
let aMonth=0, aSec='', aStage='', aReg='', aQ='', curC=null;

function filtered(){
  return CO.filter(c=>{
    if(aMonth && c.m!==aMonth) return false;
    if(aSec && c.sec!==aSec) return false;
    if(aStage && c.st!==aStage) return false;
    if(aReg && c.r!==aReg) return false;
    if(aQ){ const q=aQ.toLowerCase(); if(!c.n.toLowerCase().includes(q)&&!c.sec.toLowerCase().includes(q)&&!(lang==='fr'?c.desc:c.descEN).toLowerCase().includes(q)) return false; }
    return true;
  });
}

// ── STATS ─────────────────────────────────────────────────
function renderStats(){
  const cs=filtered(), tot=cs.reduce((s,c)=>s+c.a,0), avg=cs.length?(tot/cs.length).toFixed(1):0;
  const topS=Object.entries(cs.reduce((m,c)=>{m[c.sec]=(m[c.sec]||0)+c.a;return m},{})).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
  const femN=cs.filter(c=>c.f).length, femP=cs.length?Math.round(femN/cs.length*100):0;
  const topDisplay = topS!=='—' ? TS('sectors',topS).split('/')[0].trim() : '—';
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-label">${T('statTotal')}</div><div class="stat-value gold">${fmt(tot)}</div><div class="stat-sub">${T('statSub1')(cs.length)}</div><div class="stat-accent" style="width:100%"></div></div>
    <div class="stat"><div class="stat-label">${T('statAvg')}</div><div class="stat-value">${avg} M€</div><div class="stat-sub">${T('statSub2')}</div><div class="stat-accent" style="width:60%"></div></div>
    <div class="stat"><div class="stat-label">${T('statTop')}</div><div class="stat-value" style="font-size:14px;margin-top:6px">${topDisplay}</div><div class="stat-sub">${T('statSub3')}</div><div class="stat-accent" style="width:80%"></div></div>
    <div class="stat"><div class="stat-label">${T('statFem')}</div><div class="stat-value">${femN}</div><div class="stat-sub">${T('statSub4')(femP)}</div><div class="stat-accent" style="width:${femP}%"></div></div>`;
}

// ── GRID ──────────────────────────────────────────────────
function renderGrid(){
  const cs=filtered();
  document.getElementById('fCount').textContent=T('results')(cs.length);
  if(!cs.length){ document.getElementById('grid').innerHTML=`<div class="empty-state"><div style="font-size:36px;margin-bottom:10px">🔍</div><p>${T('noResults')}</p></div>`; return; }
  document.getElementById('grid').innerHTML=cs.map(c=>{
    const col=sc(c.sec), secLabel=TS('sectors',c.sec).split('/')[0].trim(), stLabel=TS('stages',c.st);
    const amtInt=c.a>=1000, amtDisp=amtInt?(c.a/1000).toFixed(1)+' Md':c.a;
    return`<div class="card" onclick="openModal(${c.id})">
      <div class="card-bar" style="background:${col}"></div>
      <div class="card-top">
        <div class="card-name">${c.n}</div>
        <div class="card-amt">${amtDisp}<span> M€</span></div>
      </div>
      <div class="badges">
        <span class="b b-stage">${stLabel}</span>
        <span class="b" style="background:${col}18;color:${col};border:1px solid ${col}30">${secLabel}</span>
        <span class="b b-month">${T('months')[c.m]}</span>
        ${c.f?`<span class="b b-fem">${T('female')}</span>`:''}
      </div>
      <div class="card-foot">
        <span class="card-region">📍 ${c.r}</span>
        <div class="card-links" onclick="event.stopPropagation()">
          <a class="link-btn link-li" href="https://www.linkedin.com/company/${c.li}" target="_blank">in ${T('linkedin')}</a>
          <a class="link-btn link-careers" href="${c.website}" target="_blank">🔗 ${T('careers')}</a>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(id){
  curC=CO.find(x=>x.id===id); if(!curC) return;
  renderModal(curC);
  document.getElementById('overlay').classList.add('open');
}

function renderModal(c){
  const col=sc(c.sec), stLabel=TS('stages',c.st), secLabel=TS('sectors',c.sec), moLabel=TS('models',c.mo);
  document.getElementById('mName').textContent=c.n;
  document.getElementById('mAmt').textContent=fmt(c.a)+' · '+stLabel;
  document.getElementById('mBadges').innerHTML=`
    <span class="mb" style="background:${col}18;color:${col}">${secLabel}</span>
    <span class="mb b-month" style="background:#1A120810;color:#6B5A44;border:1px solid #D4C5A9">${T('months')[c.m]} 2026</span>
    <span class="mb" style="background:#F4EFE6;color:#6B5A44;border:1px solid #D4C5A9">📍 ${c.r}</span>
    ${c.f?`<span class="mb b-fem" style="background:#FFF8EC;color:#C4973A;border:1px solid #E8D5A3">${T('femaleModal')}</span>`:''}`;
  document.getElementById('mBody').innerHTML=`
    <div class="desc">${lang==='fr'?c.desc:c.descEN}</div>
    <div class="igrid">
      <div class="iitem"><label>${T('fStage')}</label><p>${stLabel}</p></div>
      <div class="iitem"><label>${T('fAmount')}</label><p>${c.a} M€</p></div>
      <div class="iitem"><label>${T('fRegion')}</label><p>${c.r}</p></div>
      <div class="iitem"><label>${T('fModel')}</label><p>${moLabel}</p></div>
      <div class="iitem"><label>${T('fSector')}</label><p>${secLabel}</p></div>
      <div class="iitem"><label>${T('fMonth')}</label><p>${T('months')[c.m]} 2026</p></div>
    </div>
    ${c.inv.length?`<div class="inv-sec"><label>${T('fInvestors')}</label><div class="inv-pills">${c.inv.map(i=>`<span class="inv-pill">${i}</span>`).join('')}</div></div>`:''}
    <div class="m-links">
      <a class="m-link-btn m-link-li" href="https://www.linkedin.com/company/${c.li}" target="_blank">in ${T('linkedin')}</a>
      <a class="m-link-btn m-link-careers" href="${c.website}" target="_blank">🔗 ${T('careers')}</a>
      <span class="m-src">${T('src')}</span>
    </div>`;
}

function closeOverlay(e){ if(e.target===document.getElementById('overlay')) closeModal(); }
function closeModal(){ document.getElementById('overlay').classList.remove('open'); curC=null; }

// ── FILTERS ───────────────────────────────────────────────
function rebuildMonthPills(){
  const ms=T('monthsShort');
  document.getElementById('monthPills').innerHTML=ms.map((m,i)=>
    `<button class="pill${aMonth===i?' active':''}" onclick="setMonth(${i},this)">${m}</button>`
  ).join('');
}

function rebuildDropdowns(){
  // Sector
  const sf=document.getElementById('sectorF');
  const curSec=sf.value;
  sf.innerHTML=`<option value="">${T('allSectors')}</option>`;
  [...new Set(CO.map(c=>c.sec))].sort().forEach(s=>{
    const o=document.createElement('option'); o.value=s; o.textContent=TS('sectors',s); if(s===curSec) o.selected=true; sf.appendChild(o);
  });

  // Stage
  const stf=document.getElementById('stageF');
  const curSt=stf.value;
  stf.innerHTML=`<option value="">${T('allStages')}</option>`;
  ['Seed','Série A','Série B','Série C','Série D','Série E','Growth Equity','Late Stage'].forEach(s=>{
    const o=document.createElement('option'); o.value=s; o.textContent=TS('stages',s); if(s===curSt) o.selected=true; stf.appendChild(o);
  });

  // Region
  const rf=document.getElementById('regionF');
  const curReg=rf.value;
  rf.innerHTML=`<option value="">${T('allRegions')}</option>`;
  [...new Set(CO.map(c=>c.r))].sort().forEach(r=>{
    const o=document.createElement('option'); o.value=r; o.textContent=r; if(r===curReg) o.selected=true; rf.appendChild(o);
  });

  document.getElementById('searchIn').placeholder=T('searchPH');
}

function setMonth(i,btn){
  aMonth=i;
  document.querySelectorAll('#monthPills .pill').forEach((p,j)=>p.classList.toggle('active',j===i));
  renderAll(); updateChart();
}

// ── CHART ─────────────────────────────────────────────────
let chart=null;
function initChart(){
  const ctx=document.getElementById('monthlyChart').getContext('2d');
  chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:LANG.fr.months.slice(1),
      datasets:[{
        label:'M€',
        data:MTOTALS.slice(1),
        backgroundColor:['#E8D5A3','#E8D5A3','#C4973A','#E8D5A3','#E8D5A3'],
        borderRadius:4,borderSkipped:false
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1A1208',titleColor:'#F9F6F0',bodyColor:'#B0A08A',
          callbacks:{
            label:ctx=>{const v=ctx.parsed.y,i=ctx.dataIndex+1;return v>=1000?`${(v/1000).toFixed(2)} Md€ — ${MDEALS[i]} deals`:`${v} M€ — ${MDEALS[i]} deals`;},
            title:ctx=>[ctx[0].label+' 2026']
          }
        }
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:11},color:'#8C7A5E'}},
        y:{grid:{color:'#E8DFD0'},ticks:{callback:v=>v>=1000?(v/1000).toFixed(1)+'Md':v+'M',color:'#B0A08A',font:{size:10}}}
      },
      onClick:(e,els)=>{
        if(els.length){
          const i=els[0].index+1;
          const newM=i===aMonth?0:i;
          aMonth=newM;
          rebuildMonthPills();
          renderAll(); updateChart();
        }
      }
    }
  });
}

function updateChart(){
  if(!chart) return;
  const fr_months=LANG.fr.months.slice(1);
  chart.data.labels=T('months').slice(1);
  chart.data.datasets[0].backgroundColor=fr_months.map((_,i)=>(!aMonth||aMonth===i+1)?'#C4973A':'#E8D5A3');
  chart.options.plugins.tooltip.callbacks.title=ctx=>[ctx[0].label+' 2026'];
  chart.update();
}

// ── RENDER ALL ────────────────────────────────────────────
function renderAll(){ renderStats(); renderGrid(); }

// ── INIT ──────────────────────────────────────────────────
document.getElementById('headerSub').textContent=T('subtitle');
document.getElementById('langBtn').textContent=T('langBtn');
document.getElementById('chartHead').textContent=T('chartTitle');
document.getElementById('filterMonthLabel').textContent=T('filterMonth');

rebuildMonthPills();
rebuildDropdowns();

document.getElementById('sectorF').onchange=e=>{aSec=e.target.value;renderAll();};
document.getElementById('stageF').onchange=e=>{aStage=e.target.value;renderAll();};
document.getElementById('regionF').onchange=e=>{aReg=e.target.value;renderAll();};
document.getElementById('searchIn').oninput=e=>{aQ=e.target.value;renderAll();};

initChart();
renderAll();
</script>
