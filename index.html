<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>French Tech Fundraising 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFC;color:#1E293B}
.header{background:#fff;border-bottom:1px solid #E2E8F0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.flag{display:flex;height:24px;width:40px;border-radius:3px;overflow:hidden;flex-shrink:0}.flag div{flex:1}
.title-row{display:flex;align-items:center;gap:10px}.title-text{font-size:17px;font-weight:700}.title-sub{font-size:12px;color:#64748B}
.year-badge{background:#EFF6FF;color:#2563EB;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid #BFDBFE}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:16px 24px 8px}
.stat{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:#64748B;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.stat-value{font-size:24px;font-weight:800;margin-top:4px}.stat-sub{font-size:11px;color:#94A3B8;margin-top:2px}
.chart-wrap{background:#fff;border:1px solid #E2E8F0;border-radius:10px;margin:0 24px 8px;padding:16px 20px}
.chart-head{font-size:13px;font-weight:600;color:#374151;margin-bottom:12px}.chart-container{height:160px}
.filters{display:flex;align-items:center;gap:8px;padding:10px 24px 6px;flex-wrap:wrap}
.f-label{font-size:11px;font-weight:600;color:#94A3B8;white-space:nowrap}
.pills{display:flex;gap:3px;background:#F1F5F9;padding:3px;border-radius:7px}
.pill{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#64748B;transition:all .15s;white-space:nowrap}
.pill.active{background:#fff;color:#2563EB;box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:700}
.fsel{padding:5px 8px;border:1px solid #E2E8F0;border-radius:6px;font-size:11px;color:#374151;background:#fff;cursor:pointer;outline:none}
.search{padding:5px 10px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;background:#fff;outline:none;width:160px}
.search:focus{border-color:#93C5FD}.f-count{margin-left:auto;font-size:11px;color:#94A3B8;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;padding:8px 24px 24px}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 14px 12px 18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.card:hover{border-color:#93C5FD;box-shadow:0 4px 14px rgba(37,99,235,.1);transform:translateY(-1px)}
.card-bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.card-name{font-size:14px;font-weight:700}.card-amt{font-size:17px;font-weight:800;color:#2563EB;white-space:nowrap}
.card-amt span{font-size:11px;font-weight:500;color:#94A3B8}
.badges{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.b{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.b-stage{background:#F1F5F9;color:#475569}.b-month{background:#FDF4FF;color:#9333EA}.b-region{background:#F0FDF4;color:#16A34A}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #F8FAFC}
.fem{font-size:10px;color:#DB2777;background:#FDF2F8;padding:2px 5px;border-radius:3px}.model-tag{font-size:10px;color:#94A3B8}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:580px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mh{padding:18px 20px 0;border-bottom:1px solid #F1F5F9}
.mh-top{display:flex;align-items:flex-start;justify-content:space-between}
.m-name{font-size:20px;font-weight:800}.m-amt{font-size:22px;font-weight:800;color:#2563EB}
.m-close{background:#F1F5F9;border:none;border-radius:6px;padding:5px 9px;cursor:pointer;font-size:14px;color:#64748B}
.m-badges{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0 0}
.mb{display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:500}
.mtabs{display:flex}.mtab{padding:9px 14px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:#64748B;border-bottom:2px solid transparent}
.mtab.active{color:#2563EB;border-bottom-color:#2563EB;font-weight:700}
.mbody{overflow-y:auto;padding:18px 20px;flex:1}
.desc{background:#F8FAFC;border-radius:8px;padding:13px;font-size:13px;color:#475569;line-height:1.6}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.iitem label{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.iitem p{font-size:13px;font-weight:500}
.inv-sec{margin-top:14px}.inv-sec label{font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:7px}
.inv-pills{display:flex;flex-wrap:wrap;gap:5px}.inv-pill{background:#F8FAFC;border:1px solid #E2E8F0;padding:3px 9px;border-radius:20px;font-size:11px;color:#374151}
.src{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#2563EB;margin-top:12px;text-decoration:none}
.job-links{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.jbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:7px;font-size:11px;font-weight:600;text-decoration:none;border:none;cursor:pointer}
.jbtn-wttj{background:#FF3C3C;color:#fff}.jbtn-li{background:#0A66C2;color:#fff}.jbtn-gen{background:#F1F5F9;color:#374151;border:1px solid #E2E8F0}
.jcard{border:1px solid #E2E8F0;border-radius:8px;padding:12px;margin-bottom:8px}
.jcard-title{font-size:13px;font-weight:700}
.jcard-meta{font-size:11px;color:#64748B;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.jcard-desc{font-size:12px;color:#475569;margin-top:7px;line-height:1.5}
.j-note{font-size:10px;color:#94A3B8;margin-bottom:10px;font-style:italic}
.jempty{text-align:center;padding:28px;color:#94A3B8;font-size:13px}
.empty-state{text-align:center;padding:48px 24px;color:#94A3B8;grid-column:1/-1}
.loading{text-align:center;padding:60px;color:#94A3B8;grid-column:1/-1}
@media(max-width:640px){.stats{grid-template-columns:1fr 1fr}.filters{gap:6px}}
</style>
</head>
<body>
<div class="header">
  <div class="title-row">
    <div class="flag"><div style="background:#002395"></div><div style="background:#EEE"></div><div style="background:#ED2939"></div></div>
    <div><div class="title-text">French Tech Fundraising</div><div class="title-sub">Levées de fonds · Source: Eldorado.co</div></div>
  </div>
  <div class="year-badge">2026 Dashboard</div>
</div>
<div class="stats" id="statsBar"></div>
<div class="chart-wrap">
  <div class="chart-head">Montants levés par mois (M€) — cliquez une barre pour filtrer</div>
  <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
</div>
<div class="filters">
  <span class="f-label">Mois</span>
  <div class="pills" id="monthPills"></div>
  <select class="fsel" id="sectorF"><option value="">Tous les secteurs</option></select>
  <select class="fsel" id="stageF"><option value="">Tous les stades</option></select>
  <select class="fsel" id="regionF"><option value="">Toutes les régions</option></select>
  <input class="search" id="searchIn" placeholder="🔍 Rechercher..."/>
  <span class="f-count" id="fCount"></span>
</div>
<div class="grid" id="grid"><div class="loading">Chargement des données…</div></div>
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <div class="mh">
      <div class="mh-top">
        <div><div class="m-name" id="mName"></div><div class="m-amt" id="mAmt"></div></div>
        <button class="m-close" onclick="closeModal()">✕</button>
      </div>
      <div class="m-badges" id="mBadges"></div>
      <div class="mtabs">
        <button class="mtab active" onclick="switchTab('ov',this)">Vue d'ensemble</button>
        <button class="mtab" onclick="switchTab('jobs',this)">💼 Jobs</button>
      </div>
    </div>
    <div class="mbody">
      <div id="tabOv"></div>
      <div id="tabJobs" style="display:none"></div>
    </div>
  </div>
</div>
<script>
// Monthly summary (from Eldorado.co — update alongside companies.json each month)
const MONTH_META = {
  1:{name:'Janvier',total:540.7,deals:29},
  2:{name:'Février',total:438.6,deals:35},
  3:{name:'Mars',   total:1735, deals:35},
  4:{name:'Avril',  total:659,  deals:37},
  5:{name:'Mai',    total:440,  deals:31}
};

const SC={'Intelligence Artificielle':'#7C3AED','Deep Tech':'#4338CA','Biotech':'#059669','Santé / MedTech':'#0891B2','Software / SaaS':'#2563EB','Énergie':'#D97706','Cybersécurité':'#DC2626','FinTech':'#10B981','LegalTech':'#EA580C','Aérospatial':'#0284C7','Assurance':'#6D28D9','Gaming':'#DB2777','Big Data':'#475569','Cleantech':'#16A34A'};
function sc(s){for(const[k,v]of Object.entries(SC))if(s&&s.includes(k.split('/')[0].trim()))return v;return'#64748B';}
function fmt(n){return n>=1000?(n/1000).toFixed(2)+' Md€':n+' M€';}

let CO=[], aMonth=0, aSec='', aStage='', aReg='', aQ='', curC=null, chart=null;

// Load data from data/companies.json
fetch('data/companies.json')
  .then(r=>r.json())
  .then(data=>{CO=data; initFilters(); initChart(); renderAll();})
  .catch(()=>{document.getElementById('grid').innerHTML='<div class="empty-state"><p>Erreur de chargement. Vérifiez que data/companies.json existe.</p></div>';});

function filtered(){return CO.filter(c=>{
  if(aMonth&&c.month!==aMonth)return false;
  if(aSec&&c.sector!==aSec)return false;
  if(aStage&&c.stage!==aStage)return false;
  if(aReg&&c.region!==aReg)return false;
  if(aQ){const q=aQ.toLowerCase();if(!c.name.toLowerCase().includes(q)&&!c.sector.toLowerCase().includes(q)&&!c.description.toLowerCase().includes(q))return false;}
  return true;
});}

function renderStats(){
  const cs=filtered(),tot=cs.reduce((s,c)=>s+c.amount,0),avg=cs.length?(tot/cs.length).toFixed(1):0;
  const topS=Object.entries(cs.reduce((m,c)=>{m[c.sector]=(m[c.sector]||0)+c.amount;return m},{})).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';
  const femN=cs.filter(c=>c.femaleFounded).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-label">Total Levé</div><div class="stat-value" style="color:#2563EB">${fmt(tot)}</div><div class="stat-sub">${cs.length} entreprises (filtrées)</div></div>
    <div class="stat"><div class="stat-label">Ticket Moyen</div><div class="stat-value">${avg} M€</div><div class="stat-sub">Source: Eldorado.co</div></div>
    <div class="stat"><div class="stat-label">Secteur Leader</div><div class="stat-value" style="font-size:14px;margin-top:8px">${topS.split('/')[0].trim()}</div><div class="stat-sub">par montants levés</div></div>
    <div class="stat"><div class="stat-label">Équipes ♀</div><div class="stat-value">${femN}</div><div class="stat-sub">${cs.length?Math.round(femN/cs.length*100):0}% des opérations</div></div>`;
}

function renderGrid(){
  const cs=filtered();
  document.getElementById('fCount').textContent=`${cs.length} résultat${cs.length!==1?'s':''}`;
  if(!cs.length){document.getElementById('grid').innerHTML='<div class="empty-state"><div style="font-size:36px;margin-bottom:10px">🔍</div><p>Aucune entreprise pour ces filtres.</p></div>';return;}
  document.getElementById('grid').innerHTML=cs.map(c=>{
    const col=sc(c.sector);
    return`<div class="card" onclick="openModal(${c.id})">
      <div class="card-bar" style="background:${col}"></div>
      <div class="card-top"><div class="card-name">${c.name}</div><div class="card-amt">${c.amount>=1000?(c.amount/1000).toFixed(1)+' Md':c.amount}<span> M€</span></div></div>
      <div class="badges">
        <span class="b b-stage">${c.stage}</span>
        <span class="b" style="background:${col}18;color:${col}">${c.sector.split('/')[0].trim()}</span>
        <span class="b b-month">${c.monthName}</span>
      </div>
      <div class="card-foot">
        <span class="b b-region">📍 ${c.region}</span>
        ${c.femaleFounded?'<span class="fem">♀ Fondatrice</span>':''}
        <span class="model-tag">${c.model}</span>
      </div>
    </div>`;
  }).join('');
}

function openModal(id){
  curC=CO.find(x=>x.id===id);if(!curC)return;
  const c=curC,col=sc(c.sector);
  document.getElementById('mName').textContent=c.name;
  document.getElementById('mAmt').textContent=fmt(c.amount)+' · '+c.stage;
  document.getElementById('mBadges').innerHTML=`
    <span class="mb" style="background:${col}18;color:${col}">${c.sector}</span>
    <span class="mb b-month">${c.monthName} 2026</span>
    <span class="mb b-region">📍 ${c.region}</span>
    ${c.femaleFounded?'<span class="mb" style="background:#FDF2F8;color:#DB2777">♀ Co-fondée par une femme</span>':''}`;
  document.querySelectorAll('.mtab').forEach((t,i)=>t.classList.toggle('active',i===0));
  document.getElementById('tabOv').style.display='';document.getElementById('tabJobs').style.display='none';
  renderOv(c);renderJobsDefault(c);
  document.getElementById('overlay').classList.add('open');
}

function renderOv(c){
  document.getElementById('tabOv').innerHTML=`
    <div class="desc">${c.description}</div>
    <div class="igrid">
      <div class="iitem"><label>Stade</label><p>${c.stage}</p></div>
      <div class="iitem"><label>Montant</label><p>${c.amount} M€</p></div>
      <div class="iitem"><label>Région</label><p>${c.region}</p></div>
      <div class="iitem"><label>Modèle</label><p>${c.model}</p></div>
      <div class="iitem"><label>Secteur</label><p>${c.sector}</p></div>
      <div class="iitem"><label>Mois</label><p>${c.monthName} 2026</p></div>
    </div>
    ${c.investors&&c.investors.length?`<div class="inv-sec"><label>Investisseurs</label><div class="inv-pills">${c.investors.map(i=>`<span class="inv-pill">${i}</span>`).join('')}</div></div>`:''}
    <a href="https://eldorado.co" target="_blank" class="src">↗ Source: Eldorado.co</a>`;
}

function renderJobsDefault(c){
  const w=`https://www.welcometothejungle.com/fr/companies/${c.wttj}/jobs`;
  const l=`https://www.linkedin.com/company/${c.linkedin}/jobs`;
  document.getElementById('tabJobs').innerHTML=`
    <div class="job-links">
      <a class="jbtn jbtn-wttj" href="${w}" target="_blank">🌿 Welcome to the Jungle</a>
      <a class="jbtn jbtn-li" href="${l}" target="_blank">in LinkedIn Jobs</a>
    </div>
    <div class="jempty"><div style="font-size:28px;margin-bottom:8px">💼</div><p>Cliquez un portail ci-dessus pour voir les offres en temps réel.</p></div>`;
}

function switchTab(t,btn){
  document.querySelectorAll('.mtab').forEach(x=>x.classList.remove('active'));btn.classList.add('active');
  document.getElementById('tabOv').style.display=t==='ov'?'':'none';
  document.getElementById('tabJobs').style.display=t==='jobs'?'':'none';
}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}
function closeModal(){document.getElementById('overlay').classList.remove('open');curC=null;}

function initFilters(){
  const months=Object.entries(MONTH_META);
  document.getElementById('monthPills').innerHTML=`<button class="pill active" onclick="setMonth(0,this)">Tous</button>`+months.map(([k,v])=>`<button class="pill" onclick="setMonth(${k},this)">${v.name}</button>`).join('');
  const sf=document.getElementById('sectorF');
  [...new Set(CO.map(c=>c.sector))].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sf.appendChild(o);});
  sf.onchange=e=>{aSec=e.target.value;renderAll();};
  const stf=document.getElementById('stageF');
  ['Seed','Série A','Série B','Série C','Série D','Série E','Growth Equity','Late Stage'].forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;stf.appendChild(o);});
  stf.onchange=e=>{aStage=e.target.value;renderAll();};
  const rf=document.getElementById('regionF');
  [...new Set(CO.map(c=>c.region))].sort().forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;rf.appendChild(o);});
  rf.onchange=e=>{aReg=e.target.value;renderAll();};
  document.getElementById('searchIn').oninput=e=>{aQ=e.target.value;renderAll();};
}

function setMonth(i,btn){aMonth=Number(i);document.querySelectorAll('#monthPills .pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');renderAll();}

function initChart(){
  const months=Object.values(MONTH_META);
  const ctx=document.getElementById('monthlyChart').getContext('2d');
  chart=new Chart(ctx,{type:'bar',data:{
    labels:months.map(m=>m.name),
    datasets:[{label:'M€',data:months.map(m=>m.total),backgroundColor:months.map((_,i)=>i===2?'#2563EB':'#BFDBFE'),borderRadius:6,borderSkipped:false}]
  },options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y,m=months[ctx.dataIndex];return v>=1000?`${(v/1000).toFixed(2)} Md€ — ${m.deals} deals`:`${v} M€ — ${m.deals} deals`;},title:ctx=>[ctx[0].label+' 2026']}}},
    scales:{x:{grid:{display:false},ticks:{font:{size:12},color:'#64748B'}},y:{grid:{color:'#F1F5F9'},ticks:{callback:v=>v>=1000?(v/1000).toFixed(1)+'Md':v+'M',color:'#94A3B8',font:{size:11}}}},
    onClick:(e,els)=>{if(els.length){const idx=els[0].index+1;const btn=document.querySelectorAll('#monthPills .pill')[idx];setMonth(idx===aMonth?0:idx,idx===aMonth?document.querySelector('#monthPills .pill'):btn);}}}});
}

function updateChart(){
  if(!chart)return;
  chart.data.datasets[0].backgroundColor=Object.keys(MONTH_META).map(k=>(!aMonth||aMonth===Number(k))?'#2563EB':'#BFDBFE');
  chart.update();
}

function renderAll(){renderStats();renderGrid();updateChart();}
</script>
</body>
</html>
